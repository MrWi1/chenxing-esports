<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes">
    <title>宸星电竞价目表</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 粒子背景画布 -->
    <canvas id="particles"></canvas>

    <div class="header">宸星电竞</div>

    <!-- 导航栏 -->
    <div class="navbar" id="navbar"></div>

    <!-- 搜索框 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索陪玩/趣味单/活动...">
    </div>

    <!-- 卡片列表区域 -->
    <div class="menu-section" id="menuSection"></div>

    <!-- 图片查看器弹窗 -->
    <div class="image-viewer" id="imageViewer">
        <img class="viewer-img" id="viewerImg" alt="大图预览">
        <button class="viewer-btn close-btn" id="closeViewer">✕</button>
        <div class="viewer-controls">
            <button class="viewer-btn" id="prevBtn">上一张</button>
            <button class="viewer-btn" id="nextBtn">下一张</button>
            <button class="viewer-btn" id="zoomIn">放大</button>
            <button class="viewer-btn" id="zoomOut">缩小</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
